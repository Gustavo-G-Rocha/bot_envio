<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativação — Bot Envio WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b141a;
            color: #e9edef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        .card {
            width: 400px;
            background: #1f2c34;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            color: #e9edef;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.82rem;
            color: #8696a0;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #8696a0;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #2a3942;
            border: 1.5px solid #374a55;
            border-radius: 8px;
            color: #e9edef;
            font-size: 1rem;
            font-family: 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.12em;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #25d366;
        }

        input[type="text"]::placeholder {
            color: #374a55;
            letter-spacing: 0.08em;
        }

        .btn-activate {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: #25d366;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-activate:hover:not(:disabled) {
            background: #1da851;
        }

        .btn-activate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 14px;
            font-size: 0.83rem;
            text-align: center;
            min-height: 20px;
            line-height: 1.5;
        }

        .status.error {
            color: #ff6b6b;
        }

        .status.success {
            color: #25d366;
        }

        .status.loading {
            color: #8696a0;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #8696a0;
            border-top-color: #25d366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            border: none;
            border-top: 1px solid #2a3942;
            margin: 24px 0 16px;
        }

        .footer {
            font-size: 0.75rem;
            color: #4a6370;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="24" fill="#25d366"/>
                <path d="M34.5 13.5C32 11 28.2 9.5 24 9.5C15.4 9.5 8.5 16.4 8.5 25C8.5 27.8 9.3 30.5 10.7 32.8L8.5 40L15.9 37.8C18.1 39.1 20.5 39.8 23 39.8H24C32.6 39.8 39.5 32.9 39.5 24.3C39.5 20.1 37.9 16.3 35.4 13.8L34.5 13.5Z" fill="white"/>
                <path d="M24 37H23.1C20.9 37 18.8 36.4 16.9 35.3L16.4 35L11.9 36.3L13.2 31.9L12.9 31.4C11.7 29.4 11 27.2 11 25C11 17.8 16.8 12 24 12C27.5 12 30.8 13.4 33.2 15.8C35.6 18.2 37 21.5 37 24.9C37 32.1 31.2 37 24 37Z" fill="#25d366"/>
                <path d="M20.5 17.5C20.2 16.8 19.8 16.8 19.5 16.8C19.2 16.8 18.9 16.8 18.6 16.8C18.3 16.8 17.8 16.9 17.4 17.4C17 17.9 15.8 19 15.8 21.3C15.8 23.6 17.4 25.8 17.6 26.1C17.8 26.4 20.8 31.3 25.6 33.2C29.6 34.8 30.4 34.5 31.2 34.4C32 34.3 33.8 33.3 34.2 32.2C34.6 31.1 34.6 30.2 34.5 30C34.4 29.8 34.1 29.7 33.7 29.5C33.3 29.3 31 28.2 30.6 28.1C30.2 27.9 30 27.9 29.7 28.3C29.4 28.7 28.6 29.7 28.3 30C28 30.3 27.8 30.4 27.4 30.2C27 30 25.7 29.5 24.2 28.2C23 27.1 22.2 25.8 21.9 25.4C21.6 25 21.9 24.8 22.1 24.6C22.3 24.4 22.5 24.2 22.7 23.9C22.9 23.6 23 23.4 23.2 23.1C23.4 22.8 23.3 22.5 23.2 22.3C23.1 22.1 22.3 19.8 22 18.9L20.5 17.5Z" fill="white"/>
            </svg>
        </div>

        <h1>Ativação do Software</h1>
        <p class="subtitle">
            Insira a chave de licença fornecida para<br>
            ativar o Bot Envio WhatsApp neste dispositivo.
        </p>

        <label for="keyInput">Chave de licença</label>
        <input
            type="text"
            id="keyInput"
            placeholder="XXXXX-XXXXX-XXXXX-XXXXX"
            maxlength="23"
            spellcheck="false"
            autocomplete="off"
        />

        <button class="btn-activate" id="btnActivate">Ativar</button>

        <div class="status" id="status"></div>

        <hr class="divider">
        <p class="footer">
            Cada chave é válida para um único dispositivo.<br>
            Dúvidas? Entre em contato com o suporte.
        </p>
    </div>

    <script>
        const input = document.getElementById('keyInput');
        const btn = document.getElementById('btnActivate');
        const status = document.getElementById('status');

        // Formata automaticamente no padrão XXXXX-XXXXX-XXXXX-XXXXX
        input.addEventListener('input', () => {
            let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let formatted = '';
            for (let i = 0; i < val.length && i < 20; i++) {
                if (i > 0 && i % 5 === 0) formatted += '-';
                formatted += val[i];
            }
            input.value = formatted;
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btn.click();
        });

        btn.addEventListener('click', async () => {
            const key = input.value.trim();

            if (key.length !== 23) {
                setStatus('error', 'Insira a chave completa no formato XXXXX-XXXXX-XXXXX-XXXXX.');
                return;
            }

            setLoading(true);
            setStatus('loading', '<span class="spinner"></span> Verificando chave...');

            try {
                const result = await window.licenseAPI.validate(key);
                if (result.valid) {
                    setStatus('success', '✓ Licença ativada com sucesso! Abrindo o aplicativo...');
                    btn.disabled = true;
                    input.disabled = true;
                } else {
                    setStatus('error', result.message || 'Chave inválida.');
                    setLoading(false);
                }
            } catch (err) {
                setStatus('error', 'Erro de conexão. Verifique sua internet e tente novamente.');
                setLoading(false);
            }
        });

        function setLoading(on) {
            btn.disabled = on;
            input.disabled = on;
        }

        function setStatus(type, html) {
            status.className = 'status ' + type;
            status.innerHTML = html;
        }
    </script>
</body>
</html>
